# Install: sudo ln -s /opt/dscapi/deploy/nginx-dscapi.conf /etc/nginx/sites-available/dscapi
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace SIGN_DOMAIN with your subdomain, e.g. sign.example.com

upstream dscapi_gunicorn {
    server 127.0.0.1:8081 fail_timeout=0;
}

server {
    listen 80;
    server_name SIGN_DOMAIN;

    client_max_body_size 75M;

    location / {
        proxy_pass http://dscapi_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# After HTTP works, add TLS with your existing certbot workflow:
#   sudo certbot --nginx -d SIGN_DOMAIN
