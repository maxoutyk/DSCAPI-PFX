# IG E-Sign — sign.incitegravity.com
# Install:
#   sudo cp deploy/nginx-sign.incitegravity.com.conf /etc/nginx/sites-available/dscapi
#   sudo ln -sf /etc/nginx/sites-available/dscapi /etc/nginx/sites-enabled/dscapi
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d sign.incitegravity.com
#
# Admin IP restriction: add your office IP(s) below in the /admin/ block.

upstream dscapi_gunicorn {
    server 127.0.0.1:8081 fail_timeout=0;
}

server {
    listen 80;
    server_name sign.incitegravity.com;

    client_max_body_size 75M;

    # Django admin — restrict to trusted IPs (add yours, then reload nginx)
    location /admin/ {
        allow 127.0.0.1;
        # allow 203.0.113.50;   # your office / home public IP
        deny all;

        proxy_pass http://dscapi_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://dscapi_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
