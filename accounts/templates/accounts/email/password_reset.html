<!DOCTYPE html>
<html lang="en">
<body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f6f8;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:32px;">
          <tr>
            <td>
              <h1 style="margin:0 0 16px;font-size:24px;">Reset your {{ site_name }} password</h1>
              <p style="margin:0 0 16px;line-height:1.5;">
                We received a request to reset the password for <strong>{{ user.email }}</strong>.
              </p>
              <p style="margin:0 0 24px;">
                <a href="{{ reset_url }}" style="display:inline-block;background:#ff6600;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:8px;font-weight:bold;">
                  Reset password
                </a>
              </p>
              <p style="margin:0 0 16px;line-height:1.5;color:#4b5563;font-size:14px;">
                Or copy this link into your browser:<br>
                <a href="{{ reset_url }}" style="color:#ff6600;word-break:break-all;">{{ reset_url }}</a>
              </p>
              <p style="margin:0;line-height:1.5;color:#6b7280;font-size:13px;">
                This link expires in {{ expiry_hours }} hours. If you didn't request this, ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
