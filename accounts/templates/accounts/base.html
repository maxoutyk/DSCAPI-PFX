<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DSCAPI{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .layout { max-width: 960px; margin: 0 auto; padding: 24px; }
    .nav {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .nav-links { display: flex; gap: 16px; flex-wrap: wrap; }
    .brand { font-weight: 700; font-size: 1.1rem; color: var(--text); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    h1, h2 { margin-top: 0; }
    .muted { color: var(--muted); }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; }
    input[type="text"], input[type="email"], input[type="password"], input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      margin-bottom: 14px;
    }
    .btn {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: var(--accent-hover); text-decoration: none; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); }
    .messages { margin-bottom: 16px; }
    .message {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #1e3a2f;
      border: 1px solid #166534;
    }
    .message.error { background: #3f1d1d; border-color: #991b1b; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-pending { background: #422006; color: var(--warning); }
    .badge-active { background: #14532d; color: var(--success); }
    .badge-suspended { background: #450a0a; color: var(--danger); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
    code, pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: block;
      overflow-x: auto;
      font-size: 0.85rem;
    }
    .key-box {
      font-family: ui-monospace, monospace;
      word-break: break-all;
      padding: 14px;
      background: #111827;
      border: 1px dashed var(--warning);
      border-radius: 8px;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="nav">
      <a class="brand" href="{% url 'home' %}">DSCAPI</a>
      <div class="nav-links">
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}">Dashboard</a>
          <a href="{% url 'keys' %}">API Keys</a>
          <a href="{% url 'certs' %}">Certificates</a>
          <a href="{% url 'docs' %}">API Docs</a>
          <a href="{% url 'logout' %}">Logout</a>
        {% else %}
          <a href="{% url 'login' %}">Login</a>
          <a href="{% url 'register' %}">Register</a>
        {% endif %}
      </div>
    </nav>

    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
