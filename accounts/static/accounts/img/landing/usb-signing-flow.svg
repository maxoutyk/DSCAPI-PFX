<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="usbFlowTitle">
  <title id="usbFlowTitle">USB DSC signing flow from API to local agent to signed PDF</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ff6600"/>
    </marker>
  </defs>
  <rect width="720" height="280" rx="16" fill="#0a0f2e"/>

  <!-- Step 1 -->
  <g transform="translate(32 48)">
    <rect width="180" height="184" rx="14" fill="#121a3d" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="24" cy="24" r="14" fill="#ff6600"/>
    <text x="24" y="29" text-anchor="middle" fill="#020626" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">1</text>
    <text x="90" y="92" text-anchor="middle" fill="#f0f1f5" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">Prepare job</text>
    <text x="90" y="118" text-anchor="middle" fill="#8b8fa8" font-family="Inter, system-ui, sans-serif" font-size="12">Your ERP / backend</text>
    <rect x="28" y="132" width="124" height="32" rx="8" fill="rgba(255,102,0,0.12)" stroke="rgba(255,102,0,0.35)"/>
    <text x="90" y="153" text-anchor="middle" fill="#ff6600" font-family="JetBrains Mono, monospace" font-size="10">/api/sign/usb/</text>
  </g>

  <line x1="220" y1="140" x2="268" y2="140" stroke="#ff6600" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <g transform="translate(276 48)">
    <rect width="180" height="184" rx="14" fill="#121a3d" stroke="rgba(255,102,0,0.35)"/>
    <circle cx="24" cy="24" r="14" fill="#ff6600"/>
    <text x="24" y="29" text-anchor="middle" fill="#020626" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">2</text>
    <rect x="58" y="58" width="64" height="88" rx="10" fill="#1a2347" stroke="#ff6600" stroke-width="1.5"/>
    <rect x="70" y="72" width="40" height="24" rx="4" fill="rgba(255,102,0,0.2)"/>
    <text x="90" y="88" text-anchor="middle" fill="#ff6600" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">DSC</text>
    <rect x="78" y="124" width="24" height="14" rx="3" fill="#c9a227"/>
    <text x="90" y="166" text-anchor="middle" fill="#f0f1f5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">Sign on PC</text>
    <text x="90" y="186" text-anchor="middle" fill="#8b8fa8" font-family="Inter, system-ui, sans-serif" font-size="11">PKCS#11 + PIN</text>
  </g>

  <line x1="464" y1="140" x2="512" y2="140" stroke="#ff6600" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <g transform="translate(520 48)">
    <rect width="168" height="184" rx="14" fill="#121a3d" stroke="rgba(34,211,165,0.35)"/>
    <circle cx="24" cy="24" r="14" fill="#22d3a5"/>
    <text x="24" y="29" text-anchor="middle" fill="#020626" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">3</text>
    <rect x="48" y="64" width="72" height="88" rx="8" fill="rgba(34,211,165,0.1)" stroke="#22d3a5" stroke-width="1.5"/>
    <path d="M58 84 H110 M58 98 H98 M58 112 H106 M58 126 H90" stroke="rgba(34,211,165,0.7)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="120" cy="72" r="12" fill="#22d3a5"/>
    <path d="M114 72 L118 76 L128 66" fill="none" stroke="#020626" stroke-width="2" stroke-linecap="round"/>
    <text x="84" y="172" text-anchor="middle" fill="#f0f1f5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">Download PDF</text>
    <text x="84" y="192" text-anchor="middle" fill="#8b8fa8" font-family="Inter, system-ui, sans-serif" font-size="11">Verified + audited</text>
  </g>

  <text x="360" y="252" text-anchor="middle" fill="#8b8fa8" font-family="Inter, system-ui, sans-serif" font-size="12">Private key never leaves the USB token</text>
</svg>
